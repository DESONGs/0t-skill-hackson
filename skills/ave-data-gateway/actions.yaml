schema_version: v1
skill: ave-data-gateway
actions:
  - id: discover_tokens
    title: Discover Tokens
    script: scripts/discover_tokens.py
    description: Compat wrapper for token discovery, trending, and ranking data.
  - id: inspect_token
    title: Inspect Token
    script: scripts/inspect_token.py
    description: Compat wrapper for a token profile and risk snapshot.
  - id: inspect_market
    title: Inspect Market
    script: scripts/inspect_market.py
    description: Compat wrapper for pair-level market activity and recent swaps.
  - id: inspect_wallet
    title: Inspect Wallet
    script: scripts/inspect_wallet.py
    description: Compat wrapper for wallet profile, holdings, and recent activity.
  - id: review_signals
    title: Review Signals
    script: scripts/review_signals.py
    description: Compat wrapper for the public signal feed on a chain.
