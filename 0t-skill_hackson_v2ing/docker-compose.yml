services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ot_skill_enterprise
      POSTGRES_USER: ot
      POSTGRES_PASSWORD: ot_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ot -d ot_skill_enterprise"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  blob:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ot
      MINIO_ROOT_PASSWORD: ot_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - blob_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  blob_data:
