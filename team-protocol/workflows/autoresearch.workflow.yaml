workflow_id: autoresearch
title: AutoResearch Optimization Loop
description: >
  Planner-led optimization workflow that iterates through optimizer and reviewer
  until a generated skill variant is decision-ready or an escalation threshold is hit.
module_id: autoresearch
default_adapter_family: codex
team_topology: homogeneous
roles:
  - planner
  - optimizer
  - reviewer
search_space:
  - strategy_spec
  - execution_intent
  - risk_filters
  - timing
  - sizing
  - pacing
  - candidate_generation_thresholds
hard_gates:
  - review_disposition == "approve"
  - review_disposition == "escalate"
metadata:
  entry_role: planner
  inputs:
    - research_goal
    - scope_constraints
    - available_sources
  outputs:
    - research_brief
    - optimization_log
    - review_disposition
  stages:
    - id: frame
      role: planner
      produces:
        - research_brief
        - acceptance_criteria
        - escalation_triggers
    - id: improve
      role: optimizer
      consumes:
        - research_brief
        - acceptance_criteria
        - prior_review_feedback
      produces:
        - candidate_update
        - optimization_log
    - id: gate
      role: reviewer
      consumes:
        - research_brief
        - candidate_update
        - optimization_log
      produces:
        - review_disposition
        - review_findings
  loop:
    while: review_disposition == "revise"
    max_iterations: 3
  handoff_format:
    - objective
    - evidence
    - delta
    - risks
